<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>3D module viewer</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#eef4fb;font-family:"Segoe UI",system-ui,Arial,sans-serif}
  #c{position:fixed;inset:0}
  .bar{position:fixed;left:50%;bottom:12px;transform:translateX(-50%);display:flex;gap:8px;z-index:5;
    background:rgba(255,255,255,.92);border:1px solid #cdd9e8;border-radius:30px;padding:6px 8px;box-shadow:0 6px 18px rgba(20,50,80,.16)}
  .bar button{border:1px solid #cdd9e8;background:#fff;color:#1c2a36;border-radius:20px;padding:7px 13px;font-size:12.5px;font-weight:700;cursor:pointer}
  .bar button:hover{border-color:#0A5CD6}
  .bar button.on{background:linear-gradient(180deg,#FFB300,#E98A00);color:#3a2400;border-color:#E98A00}
  .bar .chip.on{background:#0A5CD6;color:#fff;border-color:#0A5CD6}
  .hint{position:fixed;top:10px;left:12px;font-size:11.5px;color:#5a6b7a;background:rgba(255,255,255,.8);
    border-radius:8px;padding:4px 9px;z-index:5}
  #load{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:#5a6b7a;font-size:13px;background:#eef4fb;z-index:9}
</style>
</head>
<body>
<div id="c"></div>
<div class="hint">Drag to rotate · scroll to zoom</div>
<div class="bar" id="bar"></div>
<div id="load">Loading 3D…</div>
<script src="three.min.js"></script>
<script>
const P=new URLSearchParams(location.search);
const showExplode=P.get('explode')==='1', showChips=P.get('chips')==='1';
let type=P.get('type')||'mono';

const app=document.getElementById('c');
let W=app.clientWidth,H=app.clientHeight;
const scene=new THREE.Scene();
(function(){const cv=document.createElement('canvas');cv.width=4;cv.height=256;const x=cv.getContext('2d');
  const g=x.createLinearGradient(0,0,0,256);g.addColorStop(0,'#f2f7fc');g.addColorStop(1,'#d6e2ef');
  x.fillStyle=g;x.fillRect(0,0,4,256);const t=new THREE.CanvasTexture(cv);t.encoding=THREE.sRGBEncoding;scene.background=t;})();
const camera=new THREE.PerspectiveCamera(42,W/H,0.1,200);
let cam={r:8.5,theta:-0.5,phi:1.15};const target=new THREE.Vector3(0,0,0);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(W,H);renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;renderer.outputEncoding=THREE.sRGBEncoding;
renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.05;
app.appendChild(renderer.domElement);

scene.add(new THREE.HemisphereLight(0xffffff,0xccd6e2,1.05));
const sun=new THREE.DirectionalLight(0xfff2d6,1.4);sun.position.set(5,9,6);sun.castShadow=true;
sun.shadow.mapSize.set(1024,1024);scene.add(sun);
scene.add(new THREE.DirectionalLight(0x9fc0e0,0.4).translateX(-6).translateY(3).translateZ(-5));

/* module */
const MW=3.0,MH=4.6,MT=0.16,FR=0.16;
const grp=new THREE.Group();scene.add(grp);grp.rotation.x=-0.05;
const texCache={};
function cellTex(t){
  if(texCache[t])return texCache[t];
  const cw=512,ch=Math.round(cw*MH/MW),c=document.createElement('canvas');c.width=cw;c.height=ch;const x=c.getContext('2d');
  x.fillStyle=(t==='thin')?'#120d0a':'#f4f7fb';x.fillRect(0,0,cw,ch);
  if(t==='thin'){const g=x.createLinearGradient(0,0,cw,ch);g.addColorStop(0,'#2a1f1a');g.addColorStop(.5,'#1c1410');g.addColorStop(1,'#2f231d');
    x.fillStyle=g;x.fillRect(0,0,cw,ch);x.globalAlpha=.5;x.strokeStyle='#0d0907';
    for(let i=0;i<40;i++){const px=i/40*cw;x.beginPath();x.moveTo(px,0);x.lineTo(px,ch);x.stroke();}x.globalAlpha=1;}
  else{const cols=6,rows=10,gap=cw*0.012,m=cw*0.02,cwid=(cw-2*m-(cols-1)*gap)/cols,chei=(ch-2*m-(rows-1)*gap)/rows;
    for(let r=0;r<rows;r++)for(let col=0;col<cols;col++){const px=m+col*(cwid+gap),py=m+r*(chei+gap);
      x.fillStyle=(t==='mono')?'#0a1018':'#16357e';
      if(t==='mono'){const ch2=cwid*0.16;x.beginPath();x.moveTo(px+ch2,py);x.lineTo(px+cwid-ch2,py);x.lineTo(px+cwid,py+ch2);
        x.lineTo(px+cwid,py+chei-ch2);x.lineTo(px+cwid-ch2,py+chei);x.lineTo(px+ch2,py+chei);x.lineTo(px,py+chei-ch2);x.lineTo(px,py+ch2);x.closePath();x.fill();}
      else{x.fillRect(px,py,cwid,chei);x.globalAlpha=.5;for(let s=0;s<40;s++){x.fillStyle=Math.random()>.5?'rgba(80,120,210,.6)':'rgba(20,40,110,.6)';x.fillRect(px+Math.random()*cwid,py+Math.random()*chei,3,3);}x.globalAlpha=1;}
      x.strokeStyle='rgba(200,210,225,.8)';x.lineWidth=Math.max(1,cwid*0.03);
      for(let b=1;b<=3;b++){const bx=px+cwid*b/4;x.beginPath();x.moveTo(bx,py);x.lineTo(bx,py+chei);x.stroke();}
    }}
  const tex=new THREE.CanvasTexture(c);tex.anisotropy=4;tex.encoding=THREE.sRGBEncoding;texCache[t]=tex;return tex;
}
function plane(w,h,m){return new THREE.Mesh(new THREE.PlaneGeometry(w,h),m);}
const cellMat=new THREE.MeshStandardMaterial({roughness:.45,metalness:.15});
const cells=plane(MW-2*FR,MH-2*FR,cellMat);
const glass=plane(MW-2*FR,MH-2*FR,new THREE.MeshPhysicalMaterial({color:0xbfe6ff,transparent:true,opacity:.18,roughness:.05,transmission:.6,thickness:.4,clearcoat:1}));
const evaMat=new THREE.MeshStandardMaterial({color:0xffe7a8,transparent:true,opacity:.22,roughness:.7});
const evaT=plane(MW-2*FR,MH-2*FR,evaMat),evaB=plane(MW-2*FR,MH-2*FR,evaMat.clone());
const back=plane(MW-2*FR,MH-2*FR,new THREE.MeshStandardMaterial({color:0xf3f5f8,roughness:.85,side:THREE.DoubleSide}));
const frameMat=new THREE.MeshStandardMaterial({color:0xd8dde4,roughness:.3,metalness:.85});
const frame=new THREE.Group();
function bar(w,h){const b=new THREE.Mesh(new THREE.BoxGeometry(w,h,MT+0.06),frameMat);b.castShadow=true;return b;}
const fT=bar(MW,FR);fT.position.y=MH/2-FR/2;const fB=bar(MW,FR);fB.position.y=-MH/2+FR/2;
const fL=bar(FR,MH-2*FR);fL.position.x=-MW/2+FR/2;const fR=bar(FR,MH-2*FR);fR.position.x=MW/2-FR/2;
[fT,fB,fL,fR].forEach(b=>frame.add(b));
const jbox=new THREE.Mesh(new THREE.BoxGeometry(0.9,0.5,0.22),new THREE.MeshStandardMaterial({color:0x111418,roughness:.6}));
const jg=new THREE.Group();jg.add(jbox);
const baseZ={back:-MT/2,evaB:-MT*0.18,cells:0,evaT:MT*0.18,glass:MT/2};
back.position.z=baseZ.back;evaB.position.z=baseZ.evaB;cells.position.z=baseZ.cells;evaT.position.z=baseZ.evaT;glass.position.z=baseZ.glass;
jg.position.z=baseZ.back-0.16;
[back,evaB,cells,evaT,glass].forEach(m=>{m.castShadow=true;grp.add(m);});grp.add(frame);grp.add(jg);

let explode=0;
function setExplode(v){explode=v;const f=v/100,SP=2.4;
  back.position.z=baseZ.back-SP*f;evaB.position.z=baseZ.evaB-SP*f*0.5;
  evaT.position.z=baseZ.evaT+SP*f*0.5;glass.position.z=baseZ.glass+SP*f;jg.position.z=(baseZ.back-0.16)-SP*f*1.3;}
function applyType(t){type=t;cellMat.map=cellTex(t);cellMat.color.set(0xffffff);cellMat.needsUpdate=true;
  back.material.color.set(t==='thin'?0x15100d:0xf3f5f8);frameMat.color.set(t==='mono'?0x1a1d22:0xd8dde4);
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',c.dataset.t===t));}
applyType(type);

/* controls */
let drag=false,lx,ly,spin=true;
try{if(matchMedia('(prefers-reduced-motion: reduce)').matches)spin=false;}catch(e){}
const el=renderer.domElement;
el.addEventListener('pointerdown',e=>{drag=true;lx=e.clientX;ly=e.clientY;el.setPointerCapture(e.pointerId);});
el.addEventListener('pointermove',e=>{if(!drag)return;cam.theta-=(e.clientX-lx)*0.008;cam.phi=Math.max(.3,Math.min(2.4,cam.phi-(e.clientY-ly)*0.006));lx=e.clientX;ly=e.clientY;});
el.addEventListener('pointerup',()=>drag=false);
el.addEventListener('wheel',e=>{e.preventDefault();cam.r=Math.max(5,Math.min(16,cam.r+e.deltaY*0.01));},{passive:false});

/* toolbar */
const bar2=document.getElementById('bar');
const spinBtn=document.createElement('button');spinBtn.className=spin?'on':'';spinBtn.textContent='⟳ Rotate';spinBtn.setAttribute('aria-label','Toggle auto-rotate');
spinBtn.onclick=()=>{spin=!spin;spinBtn.classList.toggle('on',spin);};bar2.appendChild(spinBtn);
if(showExplode){const eb=document.createElement('button');eb.textContent='⧉ Explode';
  eb.onclick=()=>{const to=explode>2?0:100;eb.classList.toggle('on',to>2);animateExplode(to);};bar2.appendChild(eb);}
if(showChips){['mono','poly','thin'].forEach(t=>{const c=document.createElement('button');c.className='chip'+(t===type?' on':'');
  c.dataset.t=t;c.textContent=t==='thin'?'Thin':t[0].toUpperCase()+t.slice(1);c.onclick=()=>applyType(t);bar2.appendChild(c);});}
let expTarget=0;
function animateExplode(to){expTarget=to;}

function resize(){W=app.clientWidth;H=app.clientHeight;camera.aspect=W/H;camera.updateProjectionMatrix();renderer.setSize(W,H);}
addEventListener('resize',resize);
let last=performance.now();
function loop(){requestAnimationFrame(loop);const now=performance.now(),dt=(now-last)/1000;last=now;
  if(spin&&!drag)cam.theta+=dt*0.3;
  if(Math.abs(expTarget-explode)>0.5)setExplode(explode+(expTarget-explode)*Math.min(1,dt*6));
  const r=cam.r,phi=cam.phi,th=cam.theta;
  camera.position.set(r*Math.sin(phi)*Math.sin(th),r*Math.cos(phi),r*Math.sin(phi)*Math.cos(th));
  camera.lookAt(target);renderer.render(scene,camera);}
applyType(type);setExplode(0);loop();
setTimeout(()=>{document.getElementById('load').style.display='none';},400);
</script>
</body>
</html>
