<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>AR — Solar PV Module</title>
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: "Segoe UI", system-ui, Arial, sans-serif;
    background: #0a1626;
    color: #fff;
  }
  model-viewer {
    width: 100vw;
    height: 100vh;
    display: block;
  }
  .header {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    z-index: 20;
    padding: 12px 16px;
    background: rgba(10, 22, 38, 0.85);
    backdrop-filter: blur(8px);
    text-align: center;
    font-size: 14px;
    line-height: 1.4;
  }
  .header b { color: #F2CB73; }
  #ar-button {
    background: linear-gradient(180deg, #F2CB73 0%, #E7B24C 100%);
    color: #0b1622;
    border: none;
    border-radius: 12px;
    padding: 14px 24px;
    font-size: 16px;
    font-weight: 700;
    box-shadow: 0 8px 24px rgba(242, 203, 115, 0.35);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .error {
    position: absolute;
    bottom: 100px;
    left: 16px;
    right: 16px;
    z-index: 30;
    background: rgba(176, 0, 32, 0.9);
    color: #fff;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 13px;
    text-align: center;
    display: none;
  }
</style>
</head>
<body>
<div class="header">
  Wait for the 3D model to load, then tap <b>View in AR</b> to place it in your space — no marker needed.
</div>

<model-viewer
  src="panel.glb"
  alt="Solar PV module"
  ar
  ar-modes="webxr scene-viewer quick-look"
  camera-controls
  auto-rotate
  exposure="1"
  shadow-intensity="1"
  camera-orbit="0deg 75deg 2.5m"
  field-of-view="30deg"
  interaction-prompt="none"
  ar-scale="auto"
  ar-placement="floor"
  scale="0.5 0.5 0.5"
  environment-image="neutral">
  <button id="ar-button" slot="ar-button">
    ⛶ View in AR
  </button>
</model-viewer>

<div class="error" id="error"></div>

<script type="module">
  const viewer = document.querySelector('model-viewer');
  const error = document.getElementById('error');

  viewer.addEventListener('error', (e) => {
    error.style.display = 'block';
    error.textContent = 'Could not load the 3D model. Please check your internet connection and refresh.';
    console.error('model-viewer error', e.detail);
  });

  // iOS Quick Look requires a USDZ in ios-src.
  // If you add panel.usdz next to panel.glb, uncomment the line below:
  // viewer.setAttribute('ios-src', 'panel.usdz');
</script>
</body>
</html>
