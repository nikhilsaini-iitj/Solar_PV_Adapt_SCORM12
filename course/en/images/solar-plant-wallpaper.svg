<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 810" width="1440" height="810">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#050b14"/>
      <stop offset="35%" stop-color="#0c1c2e"/>
      <stop offset="70%" stop-color="#142f4a"/>
      <stop offset="100%" stop-color="#1e4568"/>
    </linearGradient>
    <linearGradient id="sun" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff5d6"/>
      <stop offset="25%" stop-color="#F2CB73"/>
      <stop offset="55%" stop-color="#E7B24C"/>
      <stop offset="100%" stop-color="#d68f1e"/>
    </linearGradient>
    <linearGradient id="ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1f2d"/>
      <stop offset="100%" stop-color="#061219"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A5CD6"/>
      <stop offset="100%" stop-color="#052b66"/>
    </linearGradient>
    <linearGradient id="panelLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a75f0"/>
      <stop offset="100%" stop-color="#0A5CD6"/>
    </linearGradient>
    <filter id="sunGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="35" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="haze" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <rect width="1440" height="810" fill="url(#sky)"/>

  <!-- Distant stars / particles -->
  <g opacity="0.35" fill="#ffffff">
    <circle cx="120" cy="80" r="1.2"/>
    <circle cx="260" cy="150" r="1"/>
    <circle cx="560" cy="60" r="1.4"/>
    <circle cx="820" cy="110" r="1.1"/>
    <circle cx="1100" cy="70" r="1.3"/>
    <circle cx="1300" cy="140" r="1"/>
    <circle cx="1380" cy="55" r="1.2"/>
  </g>

  <!-- Sun with rays -->
  <g transform="translate(1080, 180)" filter="url(#sunGlow)">
    <circle r="90" fill="url(#sun)"/>
    <g stroke="#F2CB73" stroke-width="3" stroke-linecap="round" opacity="0.45">
      <line x1="0" y1="-115" x2="0" y2="-160"/>
      <line x1="82" y1="-58" x2="114" y2="-80"/>
      <line x1="100" y1="18" x2="140" y2="25"/>
      <line x1="58" y1="80" x2="80" y2="112"/>
      <line x1="-25" y1="95" x2="-35" y2="132"/>
      <line x1="-82" y1="58" x2="-114" y2="80"/>
      <line x1="-100" y1="-18" x2="-140" y2="-25"/>
      <line x1="-58" y1="-80" x2="-80" y2="-112"/>
      <line x1="25" y1="-95" x2="35" y2="-132"/>
    </g>
  </g>

  <!-- Distant mountain range silhouette -->
  <path d="M0,540 L180,430 L320,500 L480,390 L620,470 L780,360 L900,440 L1080,330 L1240,410 L1440,360 L1440,810 L0,810 Z" fill="#091825" opacity="0.7"/>

  <!-- Rolling hills / ground -->
  <path d="M0,600 C220,560 380,620 600,585 C800,555 1000,610 1200,575 C1320,555 1400,580 1440,590 L1440,810 L0,810 Z" fill="url(#ground)"/>

  <!-- Solar panel arrays in perspective -->
  <g transform="translate(0, 620)">
    <!-- Far rows (smaller, lighter, hazier) -->
    <g opacity="0.55" filter="url(#haze)">
      <g transform="translate(180, -20) scale(0.55)">
        <rect x="0" y="0" width="220" height="120" fill="url(#panelLight)" stroke="#1e4568" stroke-width="3"/>
        <line x1="55" y1="0" x2="55" y2="120" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
        <line x1="110" y1="0" x2="110" y2="120" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
        <line x1="165" y1="0" x2="165" y2="120" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
      </g>
      <g transform="translate(520, -35) scale(0.5)">
        <rect x="0" y="0" width="220" height="120" fill="url(#panelLight)" stroke="#1e4568" stroke-width="3"/>
        <line x1="55" y1="0" x2="55" y2="120" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
        <line x1="110" y1="0" x2="110" y2="120" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
        <line x1="165" y1="0" x2="165" y2="120" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
      </g>
    </g>

    <!-- Middle rows -->
    <g transform="translate(80, 30) rotate(-8 110 60) scale(0.75)">
      <rect x="0" y="0" width="260" height="145" fill="url(#panel)" stroke="#2a3f54" stroke-width="4" rx="4"/>
      <line x1="65" y1="0" x2="65" y2="145" stroke="rgba(255,255,255,0.2)" stroke-width="2.5"/>
      <line x1="130" y1="0" x2="130" y2="145" stroke="rgba(255,255,255,0.2)" stroke-width="2.5"/>
      <line x1="195" y1="0" x2="195" y2="145" stroke="rgba(255,255,255,0.2)" stroke-width="2.5"/>
      <line x1="0" y1="48" x2="260" y2="48" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
      <line x1="0" y1="97" x2="260" y2="97" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
    </g>
    <g transform="translate(420, 10) rotate(-5 130 72) scale(0.85)">
      <rect x="0" y="0" width="280" height="155" fill="url(#panel)" stroke="#2a3f54" stroke-width="4" rx="4"/>
      <line x1="70" y1="0" x2="70" y2="155" stroke="rgba(255,255,255,0.2)" stroke-width="2.5"/>
      <line x1="140" y1="0" x2="140" y2="155" stroke="rgba(255,255,255,0.2)" stroke-width="2.5"/>
      <line x1="210" y1="0" x2="210" y2="155" stroke="rgba(255,255,255,0.2)" stroke-width="2.5"/>
      <line x1="0" y1="52" x2="280" y2="52" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
      <line x1="0" y1="103" x2="280" y2="103" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
    </g>

    <!-- Near rows (larger, darker) -->
    <g transform="translate(820, 50) rotate(-3 150 80) scale(1)">
      <rect x="0" y="0" width="320" height="180" fill="url(#panel)" stroke="#2a3f54" stroke-width="5" rx="4"/>
      <line x1="80" y1="0" x2="80" y2="180" stroke="rgba(255,255,255,0.22)" stroke-width="3"/>
      <line x1="160" y1="0" x2="160" y2="180" stroke="rgba(255,255,255,0.22)" stroke-width="3"/>
      <line x1="240" y1="0" x2="240" y2="180" stroke="rgba(255,255,255,0.22)" stroke-width="3"/>
      <line x1="0" y1="60" x2="320" y2="60" stroke="rgba(255,255,255,0.14)" stroke-width="2"/>
      <line x1="0" y1="120" x2="320" y2="120" stroke="rgba(255,255,255,0.14)" stroke-width="2"/>
    </g>
    <g transform="translate(1180, 70) rotate(2 130 70) scale(0.95)">
      <rect x="0" y="0" width="300" height="170" fill="url(#panel)" stroke="#2a3f54" stroke-width="5" rx="4"/>
      <line x1="75" y1="0" x2="75" y2="170" stroke="rgba(255,255,255,0.22)" stroke-width="3"/>
      <line x1="150" y1="0" x2="150" y2="170" stroke="rgba(255,255,255,0.22)" stroke-width="3"/>
      <line x1="225" y1="0" x2="225" y2="170" stroke="rgba(255,255,255,0.22)" stroke-width="3"/>
      <line x1="0" y1="57" x2="300" y2="57" stroke="rgba(255,255,255,0.14)" stroke-width="2"/>
      <line x1="0" y1="113" x2="300" y2="113" stroke="rgba(255,255,255,0.14)" stroke-width="2"/>
    </g>
  </g>

  <!-- Subtle sun flare / lens effect -->
  <circle cx="1080" cy="180" r="180" fill="url(#sun)" opacity="0.04" filter="url(#sunGlow)"/>
</svg>