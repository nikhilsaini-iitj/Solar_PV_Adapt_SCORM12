<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="lightSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f2f6fb"/>
      <stop offset="40%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <radialGradient id="sunLight" cx="82%" cy="15%" r="36%">
      <stop offset="0%" stop-color="#fff5d1"/>
      <stop offset="18%" stop-color="#f5c842" stop-opacity="0.35"/>
      <stop offset="42%" stop-color="#f5a623" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lightPanel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#eef4f9"/>
      <stop offset="100%" stop-color="#d8e5f0"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#lightSky)"/>
  <rect width="1920" height="1080" fill="url(#sunLight)"/>

  <!-- Distant array silhouettes -->
  <g opacity="0.14" transform="translate(0 780)">
    <path d="M-20,200 L240,100 L500,200 Z" fill="#c4d6e6"/>
    <path d="M420,200 L680,95 L940,200 Z" fill="#c4d6e6"/>
    <path d="M860,200 L1140,90 L1420,200 Z" fill="#c4d6e6"/>
    <path d="M1320,200 L1600,100 L1880,200 Z" fill="#c4d6e6"/>
  </g>

  <!-- Main foreground panels -->
  <g transform="translate(360 840)" opacity="0.22">
    <g transform="translate(0 0)">
      <path d="M0,140 L180,70 L360,140 L180,210 Z" fill="url(#lightPanel)" stroke="#8aa8c0" stroke-width="1.5"/>
      <line x1="110" y1="92" x2="110" y2="188" stroke="#8aa8c0" stroke-width="1.5"/>
      <line x1="180" y1="70" x2="180" y2="210" stroke="#8aa8c0" stroke-width="1.5"/>
      <line x1="250" y1="92" x2="250" y2="188" stroke="#8aa8c0" stroke-width="1.5"/>
      <line x1="65" y1="118" x2="295" y2="118" stroke="#8aa8c0" stroke-width="1.5"/>
      <line x1="65" y1="148" x2="295" y2="148" stroke="#8aa8c0" stroke-width="1.5"/>
      <rect x="165" y="200" width="30" height="48" fill="#a6bdd0"/>
    </g>
    <g transform="translate(400 -30)">
      <path d="M0,140 L180,70 L360,140 L180,210 Z" fill="url(#lightPanel)" stroke="#8aa8c0" stroke-width="1.5"/>
      <line x1="110" y1="92" x2="110" y2="188" stroke="#8aa8c0" stroke-width="1.5"/>
      <line x1="180" y1="70" x2="180" y2="210" stroke="#8aa8c0" stroke-width="1.5"/>
      <line x1="250" y1="92" x2="250" y2="188" stroke="#8aa8c0" stroke-width="1.5"/>
      <line x1="65" y1="118" x2="295" y2="118" stroke="#8aa8c0" stroke-width="1.5"/>
      <line x1="65" y1="148" x2="295" y2="148" stroke="#8aa8c0" stroke-width="1.5"/>
      <rect x="165" y="200" width="30" height="48" fill="#a6bdd0"/>
    </g>
    <g transform="translate(800 0)">
      <path d="M0,140 L180,70 L360,140 L180,210 Z" fill="url(#lightPanel)" stroke="#8aa8c0" stroke-width="1.5"/>
      <line x1="110" y1="92" x2="110" y2="188" stroke="#8aa8c0" stroke-width="1.5"/>
      <line x1="180" y1="70" x2="180" y2="210" stroke="#8aa8c0" stroke-width="1.5"/>
      <line x1="250" y1="92" x2="250" y2="188" stroke="#8aa8c0" stroke-width="1.5"/>
      <line x1="65" y1="118" x2="295" y2="118" stroke="#8aa8c0" stroke-width="1.5"/>
      <line x1="65" y1="148" x2="295" y2="148" stroke="#8aa8c0" stroke-width="1.5"/>
      <rect x="165" y="200" width="30" height="48" fill="#a6bdd0"/>
    </g>
  </g>

  <!-- Gold corner brackets -->
  <g stroke="#f5c842" stroke-width="2.5" fill="none" opacity="0.45">
    <path d="M50 50 L90 50 M50 50 L50 90"/>
    <path d="M1870 50 L1830 50 M1870 50 L1870 90"/>
    <path d="M50 1030 L50 990 M50 1030 L90 1030"/>
    <path d="M1870 1030 L1830 1030 M1870 1030 L1870 990"/>
  </g>

  <!-- Soft bottom fade -->
  <rect y="960" width="1920" height="120" fill="#ffffff" opacity="0.55"/>
</svg>