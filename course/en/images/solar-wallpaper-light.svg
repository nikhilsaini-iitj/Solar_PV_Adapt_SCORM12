    <polygon points="0,0 120,440 -120,440" fill="url(#lightRay)" transform="rotate(144)"/>
    <polygon points="0,0 120,440 -120,440" fill="url(#lightRay)" transform="rotate(180)"/>
    <polygon points="0,0 120,440 -120,440" fill="url(#lightRay)" transform="rotate(216)"/>
    <polygon points="0,0 120,440 -120,440" fill="url(#lightRay)" transform="rotate(252)"/>
    <polygon points="0,0 120,440 -120,440" fill="url(#lightRay)" transform="rotate(288)"/>
