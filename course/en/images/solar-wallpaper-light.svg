<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="lightSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8f4fc"/>
      <stop offset="40%" stop-color="#f5faff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <radialGradient id="sunLight" cx="82%" cy="15%" r="40%">
      <stop offset="0%" stop-color="#fff7d6"/>
      <stop offset="20%" stop-color="#ffdf80" stop-opacity="0.5"/>
      <stop offset="45%" stop-color="#ffb300" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffb300" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lightRay" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb300" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffb300" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lightPanel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8f0f7"/>
      <stop offset="100%" stop-color="#d4e3f0"/>
